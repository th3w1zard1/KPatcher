name: Validate Workflows

on:
  push:
    paths:
      - '.github/workflows/**'
  pull_request:
    paths:
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  validate:
    name: Validate Workflow Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash
          sudo mv ./actionlint /usr/local/bin/

      - name: Validate workflow files
        run: |
          actionlint -color

      - name: Check for required secrets
        uses: actions/github-script@v7
        with:
          script: |
            const requiredSecrets = [
              'NETSPARKLE_PRIVATE_KEY',
              'NETSPARKLE_PUBLIC_KEY'
            ];
            
            console.log('Required secrets for workflows:');
            requiredSecrets.forEach(secret => {
              console.log(`  - ${secret}`);
            });
            
            console.log('\nNote: These secrets must be configured in repository settings.');

