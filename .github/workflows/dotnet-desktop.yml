name: .NET Core Desktop

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:

    strategy:
      matrix:
        configuration: [Debug, Release]

    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore src/KPatcher/KPatcher.csproj

    - name: Build
      run: dotnet build src/KPatcher/KPatcher.csproj -c ${{ matrix.configuration }} --no-restore

    - name: Restore test dependencies
      run: dotnet restore src/KPatcher.Tests/KPatcher.Tests.csproj

    - name: Execute unit tests
      run: dotnet test src/KPatcher.Tests/KPatcher.Tests.csproj --no-restore -c ${{ matrix.configuration }} --verbosity normal
      continue-on-error: true
