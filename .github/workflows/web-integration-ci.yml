name: Web Integration CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/Andastra/Web/**'
      - 'src/Andastra/Game.Wasm/**'
      - 'Dockerfile.web'
      - 'docker-compose.web.yml'
      - '.github/workflows/web-integration-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/Andastra/Web/**'
      - 'src/Andastra/Game.Wasm/**'
      - 'Dockerfile.web'
      - 'docker-compose.web.yml'
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.0.x'
  NODE_VERSION: '20.x'

jobs:
  build-crypto:
    name: Build Crypto Library
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore dependencies
      run: dotnet restore src/Andastra/Web/Crypto/Andastra.Web.Crypto.csproj
      
    - name: Build
      run: dotnet build src/Andastra/Web/Crypto/Andastra.Web.Crypto.csproj --configuration Release --no-restore
      
    - name: Test
      run: dotnet test src/Andastra/Web/Crypto/Andastra.Web.Crypto.csproj --configuration Release --no-build --verbosity normal
      continue-on-error: true  # Tests may not exist yet

  build-api:
    name: Build API Server
    runs-on: ubuntu-latest
    needs: build-crypto
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore dependencies
      run: dotnet restore src/Andastra/Web/Api/Andastra.Web.Api.csproj
      
    - name: Build
      run: dotnet build src/Andastra/Web/Api/Andastra.Web.Api.csproj --configuration Release --no-restore
      
    - name: Publish
      run: dotnet publish src/Andastra/Web/Api/Andastra.Web.Api.csproj --configuration Release --output ./api-publish
      
    - name: Upload API artifact
      uses: actions/upload-artifact@v4
      with:
        name: api-publish
        path: ./api-publish

  build-wasm:
    name: Build WASM Runtime
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Install WASM workload
      run: dotnet workload install wasm-tools
      continue-on-error: true  # May fail if dependencies are missing
      
    - name: Restore dependencies
      run: dotnet restore src/Andastra/Game.Wasm/Andastra.Game.Wasm.csproj
      continue-on-error: true
      
    - name: Build WASM (if possible)
      run: dotnet build src/Andastra/Game.Wasm/Andastra.Game.Wasm.csproj --configuration Release
      continue-on-error: true  # May fail if game runtime dependencies are missing

  lint-frontend:
    name: Lint Frontend Code
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Install ESLint (optional)
      run: |
        npm install -g eslint
      continue-on-error: true
      
    - name: Check JavaScript files
      run: |
        echo "Checking JavaScript syntax..."
        for file in src/Andastra/Web/Frontend/js/*.js; do
          node --check "$file" || echo "Warning: Syntax error in $file"
        done

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build-crypto, build-api]
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore dependencies
      run: |
        dotnet restore src/Andastra/Web/Crypto/Andastra.Web.Crypto.csproj
        dotnet restore src/Andastra/Web/Api/Andastra.Web.Api.csproj
        
    - name: Security scan with Snyk (if configured)
      continue-on-error: true
      run: |
        echo "Security scan placeholder - configure Snyk or similar tool"

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [build-api, lint-frontend]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker image
      run: |
        docker build -f Dockerfile.web -t andastra-web:latest .
      continue-on-error: true  # May fail if WASM dependencies missing
      
    - name: Test Docker image (if built)
      run: |
        if docker images | grep -q andastra-web; then
          echo "Docker image built successfully"
          docker images andastra-web
        else
          echo "Docker image build skipped or failed"
        fi

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build-api]
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download API artifact
      uses: actions/download-artifact@v4
      with:
        name: api-publish
        path: ./api-publish
        
    - name: Setup test environment
      run: |
        echo "Setting up test environment..."
        export Security__MasterSecret=$(openssl rand -base64 32)
        echo "Master secret generated for testing"
        
    - name: Start API server (background)
      run: |
        cd api-publish
        export ASPNETCORE_URLS="http://localhost:5000"
        export Security__MasterSecret=$(openssl rand -base64 32)
        nohup dotnet Andastra.Web.Api.dll > api.log 2>&1 &
        sleep 5
        
    - name: Test API endpoints
      run: |
        echo "Testing /api/version endpoint..."
        curl -f http://localhost:5000/api/version || exit 1
        
        echo "Testing /api/runtime/key endpoint..."
        curl -f -X POST http://localhost:5000/api/runtime/key || exit 1
        
        echo "All API tests passed!"
        
    - name: Show API logs
      if: always()
      run: |
        if [ -f api-publish/api.log ]; then
          echo "=== API Logs ==="
          cat api-publish/api.log
        fi

  deploy-preview:
    name: Deploy Preview (PR)
    runs-on: ubuntu-latest
    needs: [integration-test]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      issues: write
    
    steps:
    - name: Comment on PR
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '✅ Web integration build completed successfully!\n\n' +
                  '**Next steps:**\n' +
                  '1. Review the code changes\n' +
                  '2. Test locally using `docker-compose -f docker-compose.web.yml up`\n' +
                  '3. Verify API endpoints and frontend functionality\n\n' +
                  '**Documentation:**\n' +
                  '- [Web Integration](../docs/WEB_INTEGRATION.md)\n' +
                  '- [Deployment Guide](../docs/DEPLOYMENT_GUIDE.md)'
          })

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [integration-test, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Deploy notification
      run: |
        echo "Production deployment would happen here"
        echo "Configure your deployment target (Azure, AWS, GCP, etc.)"
        echo "Ensure secrets are properly configured in GitHub Secrets"
