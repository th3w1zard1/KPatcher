name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore src/KPatcher.Tests/KPatcher.Tests.csproj

      - name: Build
        run: dotnet build src/KPatcher.Tests/KPatcher.Tests.csproj --no-restore -c Debug

      - name: Test
        run: dotnet test src/KPatcher.Tests/KPatcher.Tests.csproj --no-build -c Debug --verbosity normal
        continue-on-error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore src/KPatcher/KPatcher.csproj -p:Configuration=Release

      - name: Run analyzers
        run: dotnet build src/KPatcher/KPatcher.csproj --no-restore -c Release -p:RunAnalyzersDuringBuild=true
